version: '3.8'

services:
  backend:
    build: ./backend
    container_name: interview-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: interview-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped